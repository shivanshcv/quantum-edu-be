# Render Blueprint - Staging (Render + Aiven MySQL)
# Optional: Use for Infrastructure-as-Code. Or create Web Service manually in Render Dashboard.
# Render auto-detects Java/Maven from pom.xml.

services:
  - type: web
    name: quantum-edu-be-staging
    plan: free

    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dspring.profiles.active=staging -jar app/target/quantum-edu-be-app-0.0.1-SNAPSHOT.jar

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: staging
      # Add these as secret env vars in Render Dashboard:
      # MYSQL_HOST, MYSQL_PORT, MYSQL_DATABASE, MYSQL_USER, MYSQL_PASSWORD
      # JWT_SECRET, APP_CORS_ORIGINS, VERIFICATION_BASE_URL
      # RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET, RAZORPAY_WEBHOOK_SECRET
