# Render Blueprint - Staging (Render + Aiven MySQL)
# Uses Docker runtime - Render's native env has no Java/Maven.

services:
  - type: web
    name: quantum-edu-be-staging
    plan: free

    runtime: docker
    dockerfilePath: ./Dockerfile

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: staging
      # Add these as secret env vars in Render Dashboard:
      # MYSQL_HOST, MYSQL_PORT, MYSQL_DATABASE, MYSQL_USER, MYSQL_PASSWORD
      # JWT_SECRET, APP_CORS_ORIGINS, VERIFICATION_BASE_URL
      # RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET, RAZORPAY_WEBHOOK_SECRET
