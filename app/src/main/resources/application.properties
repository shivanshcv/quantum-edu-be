# Base configuration - common across all environments
spring.application.name=quantum-edu-be
server.port=8080

# Default profile: dev (use -Dspring.profiles.active=staging|prod for other envs)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-hours=24

# Email
app.email.from=${EMAIL_FROM:noreply@quantumedu.com}
app.email.verification-base-url=${VERIFICATION_BASE_URL}
