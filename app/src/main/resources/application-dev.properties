# Development environment - MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/quantum_education?serverTimezone=%2B05:30
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.hikari.connection-init-sql=SET time_zone = '+05:30'

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.format_sql=true

app.email.enabled=false
app.jwt.secret=${JWT_SECRET:quantum-edu-jwt-secret-key-min-256-bits-for-hs256-algorithm}

# Cart
cart.gst-rate=0.18

# Razorpay (use env vars in prod)
razorpay.key_id=${RAZORPAY_KEY_ID:}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook_secret=${RAZORPAY_WEBHOOK_SECRET:}
app.email.from=${EMAIL_FROM:noreply@quantumedu.com}
app.email.verification-base-url=${VERIFICATION_BASE_URL:http://localhost:3000/verify-email}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:3025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
