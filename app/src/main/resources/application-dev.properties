# Development environment - MySQL local
# Override port when 8080 is in use: SERVER_PORT=8081 mvn spring-boot:run
server.port=${SERVER_PORT:8080}

# CORS: comma-separated origins. For tunnel, set APP_CORS_ORIGINS to include FE URL.
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}

spring.datasource.url=jdbc:mysql://localhost:3306/quantum_education?serverTimezone=%2B05:30
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.hikari.connection-init-sql=SET time_zone = '+05:30'

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.format_sql=true

app.email.enabled=false
app.jwt.secret=${JWT_SECRET:quantum-edu-jwt-secret-key-min-256-bits-for-hs256-algorithm}
app.jwt.dev-bypass=${JWT_DEV_BYPASS:true}

# Currency (INR for India)
app.currency.code=INR
app.currency.symbol=\u20B9

# Cart
cart.gst-rate=0.18

