# Logging: real-time docker logs + request visibility + email debugging
# Force ANSI colors for docker logs -f (Docker lacks TTY so auto-detect disables colors)
spring.output.ansi.enabled=always
logging.level.root=INFO
logging.level.com.quantum.edu=DEBUG
logging.level.com.quantum.edu.auth=DEBUG
logging.level.com.quantum.edu.auth.notification=DEBUG
# Log each incoming request (helps verify real-time logs when using docker logs -f)
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
# Spring Mail: SMTP connection/send debug (helps debug why email not received)
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG

