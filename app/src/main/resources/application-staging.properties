# Staging environment - Render + Aiven MySQL
# Same config structure as dev, with staging-specific values from env vars
server.port=${PORT:8080}

# CORS: comma-separated origins.
app.cors.allowed-origins=${APP_CORS_ORIGINS:https://quantum-education.netlify.app,http://localhost:5173,http://127.0.0.1:5173}

# MySQL - Aiven (from env vars; Aiven requires SSL). Defaults match staging Aiven.
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql-6893282-shivansh-6f29.j.aivencloud.com}:${MYSQL_PORT:25679}/${MYSQL_DATABASE:defaultdb}?serverTimezone=%2B05:30&useSSL=true&requireSSL=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:avnadmin}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.hikari.connection-init-sql=SET time_zone = '+05:30'

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.format_sql=false

# JWT - same as dev: bypass expiry for staging testing
app.email.enabled=${APP_EMAIL_ENABLED:false}
app.jwt.secret=${JWT_SECRET:quantum-edu-jwt-secret-key-min-256-bits-for-hs256-algorithm}
app.jwt.dev-bypass=${JWT_DEV_BYPASS:true}

# Currency (INR for India; override via APP_CURRENCY, APP_CURRENCY_SYMBOL)
app.currency.code=${APP_CURRENCY:INR}
app.currency.symbol=${APP_CURRENCY_SYMBOL:\u20B9}

