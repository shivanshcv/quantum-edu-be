# Staging environment - placeholder values, exact values to be provided later
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:placeholder_host}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:placeholder_db}?serverTimezone=%2B05:30
spring.datasource.username=${MYSQL_USER:placeholder_user}
spring.datasource.password=${MYSQL_PASSWORD:placeholder_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET time_zone = '+05:30'

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.format_sql=false

app.email.enabled=true
app.jwt.secret=${JWT_SECRET:placeholder_jwt_secret}
app.email.from=${EMAIL_FROM:placeholder@placeholder.com}
app.email.verification-base-url=${VERIFICATION_BASE_URL:https://placeholder.com/verify-email}

spring.mail.host=${MAIL_HOST:placeholder_host}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:placeholder}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
